<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1608"/>
      <stop offset="100%" style="stop-color:#0d0a04"/>
    </linearGradient>

    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5e27a"/>
      <stop offset="50%" style="stop-color:#e8d166"/>
      <stop offset="100%" style="stop-color:#a38600"/>
    </linearGradient>

    <linearGradient id="barGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d166"/>
      <stop offset="100%" style="stop-color:#a38600"/>
    </linearGradient>

    <linearGradient id="barCrimson" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4424e"/>
      <stop offset="100%" style="stop-color:#a1343c"/>
    </linearGradient>

    <linearGradient id="barMid" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a830"/>
      <stop offset="100%" style="stop-color:#a38600"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="160" height="160" rx="32" fill="url(#bgGrad)"/>

  <!-- Subtle inner border ring -->
  <rect x="6" y="6" width="148" height="148" rx="27"
        fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.25"/>

  <!-- Corner ticks -->
  <line x1="18" y1="14" x2="30" y2="14" stroke="#e8d166" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <line x1="14" y1="18" x2="14" y2="30" stroke="#e8d166" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <line x1="130" y1="14" x2="142" y2="14" stroke="#e8d166" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <line x1="146" y1="18" x2="146" y2="30" stroke="#e8d166" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <line x1="18" y1="146" x2="30" y2="146" stroke="#e8d166" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <line x1="14" y1="130" x2="14" y2="142" stroke="#e8d166" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <line x1="130" y1="146" x2="142" y2="146" stroke="#e8d166" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>
  <line x1="146" y1="130" x2="146" y2="142" stroke="#e8d166" stroke-width="1.2" opacity="0.4" stroke-linecap="round"/>

  <!-- ── Person / HR figure (top center) ── -->
  <circle cx="80" cy="34" r="12" fill="none" stroke="url(#goldGrad)" stroke-width="2.2" filter="url(#glow)"/>
  <path d="M54,60 Q54,48 80,48 Q106,48 106,60"
        fill="none" stroke="url(#goldGrad)" stroke-width="2.2" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Divider -->
  <line x1="28" y1="70" x2="132" y2="70" stroke="#a38600" stroke-width="0.8" opacity="0.3"/>

  <!-- ── Bar chart ── -->
  <line x1="26" y1="130" x2="134" y2="130" stroke="#a38600" stroke-width="1.2" opacity="0.5"/>

  <rect x="30" y="108" width="18" height="22" rx="4" fill="url(#barCrimson)" filter="url(#glow)"/>
  <rect x="55" y="84" width="18" height="46" rx="4" fill="url(#barGold)" filter="url(#glow)"/>
  <rect x="80" y="95" width="18" height="35" rx="4" fill="url(#barMid)" filter="url(#glow)"/>
  <rect x="105" y="76" width="18" height="54" rx="4" fill="url(#barCrimson)" filter="url(#glow)"/>

  <!-- Trend line -->
  <polyline points="39,103 64,79 89,90 114,71"
            fill="none" stroke="#e8d166" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round"
            stroke-dasharray="3,3" opacity="0.75"/>

  <!-- Trend dots -->
  <circle cx="39" cy="103" r="3.5" fill="#e8d166" filter="url(#glow)"/>
  <circle cx="64" cy="79" r="3.5" fill="#e8d166" filter="url(#glow)"/>
  <circle cx="89" cy="90" r="3.5" fill="#e8d166" filter="url(#glow)"/>
  <circle cx="114" cy="71" r="5" fill="#e8d166" stroke="#a38600" stroke-width="1.5" filter="url(#glow)"/>

  <!-- Growth arrow -->
  <polyline points="114,65 114,58 118,62" fill="none" stroke="#e8d166" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
</svg>
